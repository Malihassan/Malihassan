name: Generate Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate on every push to main
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate stats image
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Malihassan
          filename: github-metrics.svg
          template: classic
          config_timezone: Africa/Cairo

          # Only the header (name, years on GitHub, repos contributed to) — no zero rows
          base: header

          # Commit activity as an isometric calendar — highlights the 4,473 commits
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Total lines of code added/removed across repos
          plugin_lines: yes

          # Top languages by usage
          plugin_languages: yes
          plugin_languages_limit: 8
